{% extends \"base.html\" %}

{% block content %}
<div class=\"d-flex justify-content-between align-items-center\">
    <h2>📋 Системные Логи (App.log)</h2>
    <a href=\"/admin/logs\" class=\"btn btn-outline-primary btn-sm\">🔄 Обновить</a>
</div>

<div class=\"card mt-4 bg-dark text-success p-3\">
    <pre style=\"max-height: 600px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 0.9em;\">{{ log_content }}</pre>
</div>
<p class=\"text-muted small mt-2\">* Показаны последние 200 строк файла app.log</p>
{% endblock %}
